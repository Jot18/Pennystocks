name: Hourly Stock Data Harvest

on:
  schedule:
    - cron: '0 * * * 1-5'
    - cron: '0 14 * * 0,6'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'harvester/**'
      - '.github/workflows/harvest.yml'

permissions:
  contents: write

concurrency:
  group: harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: harvester/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r harvester/requirements.txt

      - name: Run harvester
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python harvester/harvest.py

      - name: Show what changed
        run: |
          echo "=== Data files ==="
          ls -lh docs/data/ || true
          echo ""
          echo "=== Status ==="
          cat docs/data/status.json || true

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "📊 Hourly harvest: $TIMESTAMP"
            git push
          fi
